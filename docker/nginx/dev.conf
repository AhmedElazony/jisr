server {
    listen 443 ssl;
    server_name jisr.ahmedelazony.com;

	ssl_certificate /etc/letsencrypt/live/jisr.ahmedelazony.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jisr.ahmedelazony.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # API Routes (Laravel)
    location /api {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

	location /app {
    	proxy_pass http://reverb:8080/app;
    	proxy_http_version 1.1;
    	proxy_set_header Upgrade $http_upgrade;
    	proxy_set_header Connection "upgrade";
    	proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Proto $scheme;
    	proxy_read_timeout 86400;
    	proxy_send_timeout 86400;
	}

    # Laravel Storage
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri $uri/ =404;

        # Prevent PHP execution in uploads (important even in dev)
        location ~* \.php$ {
            deny all;
        }

        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # PHP-FPM Configuration
    location ~ \.php$ {
        # Block access to PHP files in uploads
        location ~ ^/storage/.*\.php$ {
            deny all;
        }

        root /var/www/html/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_hide_header X-Powered-By;
    }

    # Frontend static assets (JS, CSS, images, fonts)
    location /assets/ {
        alias /var/www/html/public/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vite manifest
    location /.vite/ {
        alias /var/www/html/public/app/.vite/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend Root - Serve Vue.js SPA
    location / {
        alias /var/www/html/public/app/;
        index index.html;
        try_files $uri $uri/ index.html =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* /(\.env|\.git|composer\.(json|lock)|package.*\.json|docker-compose\.yml)$ {
        deny all;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

server {
	listen 80;
	server_name jisr.ahmedelazony.com;
	return 301 https://$host$request_uri;
}
